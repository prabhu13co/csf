        runtime_check:
          method: "resource_graph"
          query: |
            Resources
            | where type == 'microsoft.cognitiveservices/accounts'
            | where isnull(tags.DataClassification) or tostring(tags.DataClassification) == ''
            | project name, resourceGroup, subscriptionId, tags
        azure_policies:
          - policy_name: "Inherit a tag from the resource group"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/cd3aa116-8754-49c9-a813-ad46512ece54"
            effect: "modify"
            parameters:
              tagName: "DataClassification"
        remediation: |
          Ensure the parent resource group has DataClassification and tag inheritance policy is active.

  - resource_type: "microsoft.documentdb/databaseaccounts"
    relevance: "high"
    rationale: "Cosmos DB accounts store application data; classification determines access and encryption controls."
    checks:
      - check_id: "F2-COSMOS-001"
        check_name: "Cosmos DB account must inherit DataClassification tag"
        description: "Cosmos DB accounts should inherit DataClassification from their resource group."
        runtime_check:
          method: "resource_graph"
          query: |
            Resources
            | where type == 'microsoft.documentdb/databaseaccounts'
            | where isnull(tags.DataClassification) or tostring(tags.DataClassification) == ''
            | project name, resourceGroup, subscriptionId, tags
        azure_policies:
          - policy_name: "Inherit a tag from the resource group"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/cd3aa116-8754-49c9-a813-ad46512ece54"
            effect: "modify"
            parameters:
              tagName: "DataClassification"
        remediation: |
          Ensure the parent resource group has DataClassification and tag inheritance policy is active.

  - resource_type: "microsoft.web/sites"
    relevance: "medium"
    rationale: "App Services process and may cache sensitive data; classification determines TLS and auth requirements."
    checks:
      - check_id: "F2-WEB-001"
        check_name: "App Service must inherit DataClassification tag"
        description: "App Services should inherit DataClassification from their resource group."
        runtime_check:
