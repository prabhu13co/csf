        azure_policies:
          - policy_name: "Inherit a tag from the resource group"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/cd3aa116-8754-49c9-a813-ad46512ece54"
            effect: "modify"
            parameters:
              tagName: "DataClassification"
        remediation: |
          Ensure the parent resource group has DataClassification and tag inheritance policy is active.

  - resource_type: "microsoft.containerregistry/registries"
    relevance: "medium"
    rationale: "Container registries store images that may contain embedded secrets or proprietary code."
    checks:
      - check_id: "F2-ACR-001"
        check_name: "Container registry must inherit DataClassification tag"
        description: "Container registries should inherit DataClassification from their resource group."
        runtime_check:
          method: "resource_graph"
          query: |
            Resources
            | where type == 'microsoft.containerregistry/registries'
            | where isnull(tags.DataClassification) or tostring(tags.DataClassification) == ''
            | project name, resourceGroup, subscriptionId, tags
        azure_policies:
          - policy_name: "Inherit a tag from the resource group"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/cd3aa116-8754-49c9-a813-ad46512ece54"
            effect: "modify"
            parameters:
              tagName: "DataClassification"
        remediation: |
          Ensure the parent resource group has DataClassification and tag inheritance policy is active.

  - resource_type: "microsoft.eventhub/namespaces"
    relevance: "medium"
    rationale: "Event Hubs transport data streams that may contain PII or business-sensitive events."
    checks:
      - check_id: "F2-EH-001"
        check_name: "Event Hub namespace must inherit DataClassification tag"
        description: "Event Hub namespaces should inherit DataClassification from their resource group."
        runtime_check:
          method: "resource_graph"
          query: |
            Resources
            | where type == 'microsoft.eventhub/namespaces'
            | where isnull(tags.DataClassification) or tostring(tags.DataClassification) == ''
            | project name, resourceGroup, subscriptionId, tags
        azure_policies:
          - policy_name: "Inherit a tag from the resource group"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/cd3aa116-8754-49c9-a813-ad46512ece54"
            effect: "modify"
            parameters:
              tagName: "DataClassification"
        remediation: |
          Ensure the parent resource group has DataClassification and tag inheritance policy is active.

cross_cutting_queries:
  - query_id: "F2-CROSS-001"
    query_name: "Resource groups missing any classification tag"
    description: "Find resource groups missing DataClassification, Environment, or Criticality."
    query: |
      ResourceContainers
      | where type == 'microsoft.resources/subscriptions/resourcegroups'
      | where isnull(tags.DataClassification) or tostring(tags.DataClassification) == ''
          or isnull(tags.Environment) or tostring(tags.Environment) == ''
          or isnull(tags.Criticality) or tostring(tags.Criticality) == ''
      | project name, subscriptionId,
          missingDataClassification = iif(isnull(tags.DataClassification) or tostring(tags.DataClassification) == '', true, false),
          missingEnvironment = iif(isnull(tags.Environment) or tostring(tags.Environment) == '', true, false),
          missingCriticality = iif(isnull(tags.Criticality) or tostring(tags.Criticality) == '', true, false),
          tags

  - query_id: "F2-CROSS-002"
    query_name: "Resource groups with invalid DataClassification values"
    description: "Find resource groups using non-standard DataClassification values."
    query: |
      ResourceContainers
      | where type == 'microsoft.resources/subscriptions/resourcegroups'
      | where isnotnull(tags.DataClassification)
      | where tostring(tags.DataClassification) !in ('Public', 'Internal', 'Confidential', 'Restricted')
      | project name, subscriptionId, DataClassification=tostring(tags.DataClassification)

  - query_id: "F2-CROSS-003"
    query_name: "Environment tag mismatch with subscription name"
    description: "Detect resource groups where Environment tag does not match the subscription naming convention."
    query: |
      ResourceContainers
      | where type == 'microsoft.resources/subscriptions/resourcegroups'
      | where isnotnull(tags.Environment)
      | extend subName = tostring(split(subscriptionId, '/')[-1])
      | join kind=inner (
          ResourceContainers
          | where type == 'microsoft.resources/subscriptions'
          | project subscriptionId, subscriptionName=name
      ) on subscriptionId
      | extend expectedEnv = extract(@'asm-(\w+)\d{2}-', 1, subscriptionName)
      | where isnotempty(expectedEnv)
      | where tostring(tags.Environment) != expectedEnv
      | project name, subscriptionName, taggedEnv=tostring(tags.Environment), expectedEnv

  - query_id: "F2-CROSS-004"
    query_name: "Data-bearing resources missing DataClassification inheritance"
    description: "Find data-bearing resources where DataClassification tag was not inherited."
    query: |
      Resources
      | where type in (
          'microsoft.storage/storageaccounts',
          'microsoft.sql/servers',
          'microsoft.sql/servers/databases',
          'microsoft.dbforpostgresql/flexibleservers',
          'microsoft.dbformysql/flexibleservers',
          'microsoft.documentdb/databaseaccounts',
          'microsoft.keyvault/vaults',
          'microsoft.cognitiveservices/accounts',
          'microsoft.eventhub/namespaces',
          'microsoft.servicebus/namespaces',
          'microsoft.cache/redis'
        )
      | where isnull(tags.DataClassification) or tostring(tags.DataClassification) == ''
      | summarize count() by type, subscriptionId
      | order by count_ desc
