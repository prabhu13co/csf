        azure_policies:
          - policy_name: "Azure Defender for Key Vault should be enabled"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/0e6763cc-5078-4e64-889d-ff4d6a59f94e"
            effect: "AuditIfNotExists"
        remediation: |
          Enable Microsoft Defender for Key Vault:
            az security pricing create --name KeyVaults --tier Standard

      - check_id: "F7-SP-004"
        check_name: "Microsoft Defender for SQL is enabled"
