control_id: "F7"
control_name: "Security Posture Management"
control_family: "Security Operations"
severity: "high"
description: |
  Provide a comprehensive Cloud Security Posture Management (CSPM) solution to
  continuously assess and improve the security posture of Azure environments.
  Enforce policy and compliance controls across all subscriptions and detect
  threats and vulnerabilities through Microsoft Defender for Cloud.
risk_description: |
  Excessive permissions, identity theft of admin accounts, and standing privileged
  access can go undetected without continuous security posture assessment. Lack of
  centralized security management leads to configuration drift, unpatched
  vulnerabilities, and non-compliance with regulatory requirements. Without threat
  detection, attackers can persist in the environment unnoticed.
applicable_resource_types:
  - resource_type: "microsoft.security/pricings"
    relevance: "high"
    checks:
      - check_id: "F7-SP-001"
        check_name: "Microsoft Defender for Servers is enabled"
        description: "Verify that Microsoft Defender for Servers plan is enabled on all subscriptions."
        runtime_check:
          method: "resource_graph"
          query: |
            SecurityResources
            | where type == 'microsoft.security/pricings'
            | where name == 'VirtualMachines'
            | where properties.pricingTier != 'Standard'
            | project subscriptionId, name, pricingTier=properties.pricingTier
        code_check:
          patterns:
            - file_pattern: "**/*.tf"
              search: 'resource_type\s*=\s*"VirtualMachines"'
              expected: "tier should be set to 'Standard' for Defender for Servers"
            - file_pattern: "**/*.bicep"
              search: "name: 'VirtualMachines'"
              expected: "pricingTier should be 'Standard' for Defender for Servers"
        azure_policies:
          - policy_name: "Azure Defender for servers should be enabled"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/4da35fc9-c9e7-4960-aec9-797fe7d9051d"
            effect: "AuditIfNotExists"
        remediation: |
          Enable Microsoft Defender for Servers:
            az security pricing create --name VirtualMachines --tier Standard
          Or via Terraform:
            resource "azurerm_security_center_subscription_pricing" "servers" {
              tier          = "Standard"
              resource_type = "VirtualMachines"
            }

      - check_id: "F7-SP-002"
        check_name: "Microsoft Defender for Storage is enabled"
        description: "Verify that Microsoft Defender for Storage plan is enabled."
        runtime_check:
