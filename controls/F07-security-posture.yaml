            - file_pattern: "**/*.tf"
              search: 'resource_type\s*=\s*"Dns"'
              expected: "tier should be set to 'Standard' for Defender for DNS"
            - file_pattern: "**/*.bicep"
              search: "name: 'Dns'"
              expected: "pricingTier should be 'Standard' for Defender for DNS"
        azure_policies:
          - policy_name: "Azure Defender for DNS should be enabled"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/bdc59948-5574-49b3-bb91-76b7c986428d"
            effect: "AuditIfNotExists"
        remediation: |
          Enable Microsoft Defender for DNS:
            az security pricing create --name Dns --tier Standard

  - resource_type: "microsoft.security/securitycontacts"
    relevance: "high"
    checks:
      - check_id: "F7-SC-001"
        check_name: "Security contacts are configured"
        description: "Verify that security contact email and notification settings are configured in Microsoft Defender for Cloud."
        runtime_check:
          method: "resource_graph"
          query: |
            SecurityResources
            | where type == 'microsoft.security/securitycontacts'
            | where properties.emails == '' or isnull(properties.emails)
            | project subscriptionId, name, emails=properties.emails
        code_check:
          patterns:
            - file_pattern: "**/*.tf"
              search: "azurerm_security_center_contact"
              expected: "Security contact resource must exist with email and alert notifications enabled"
            - file_pattern: "**/*.bicep"
              search: "Microsoft.Security/securityContacts"
              expected: "Security contact resource must exist with email and alert notifications enabled"
        azure_policies:
          - policy_name: "Subscriptions should have a contact email address for security issues"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/4f4f78b8-e367-4b10-a341-d9a4ad5cf1c7"
            effect: "AuditIfNotExists"
        remediation: |
          Configure security contacts:
            az security contact create --name default --email security-team@company.com \
              --alert-notifications on --alerts-to-admins on
          Or via Terraform:
            resource "azurerm_security_center_contact" "main" {
              email               = "security-team@company.com"
              alert_notifications = true
              alerts_to_admins    = true
            }

  - resource_type: "microsoft.security/autoProvisioningSettings"
    relevance: "high"
    checks:
      - check_id: "F7-AP-001"
        check_name: "Auto-provisioning of monitoring agent is enabled"
        description: "Verify that auto-provisioning of the Log Analytics agent or Azure Monitor Agent is enabled for VMs."
        runtime_check:
          method: "resource_graph"
          query: |
            SecurityResources
            | where type == 'microsoft.security/autoprovisioningsettings'
            | where name == 'default'
            | where properties.autoProvision != 'On'
            | project subscriptionId, name, autoProvision=properties.autoProvision
        code_check:
          patterns:
            - file_pattern: "**/*.tf"
              search: 'auto_provision\s*=\s*"Off"'
              expected: "auto_provision should be 'On' for security monitoring"
            - file_pattern: "**/*.bicep"
              search: "autoProvision: 'Off'"
              expected: "autoProvision should be 'On' for security monitoring"
        azure_policies:
          - policy_name: "Auto provisioning of the Log Analytics agent should be enabled on your subscription"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/475aae12-b88a-4572-8b36-9b712b2b3a17"
            effect: "AuditIfNotExists"
        remediation: |
          Enable auto-provisioning:
            az security auto-provisioning-setting update --name default --auto-provision On

  - resource_type: "microsoft.authorization/policyassignments"
    relevance: "high"
    checks:
      - check_id: "F7-PA-001"
        check_name: "Azure Security Benchmark policy initiative is assigned"
        description: "Verify that the Azure Security Benchmark (ASB) or Microsoft Cloud Security Benchmark initiative is assigned at subscription or management group scope."
        runtime_check:
          method: "resource_graph"
          query: |
            PolicyResources
            | where type == 'microsoft.authorization/policyassignments'
            | where properties.policyDefinitionId contains '1f3afdf9-d0c9-4c3d-847f-89da613e70a8'
                 or properties.displayName contains 'Microsoft cloud security benchmark'
                 or properties.displayName contains 'Azure Security Benchmark'
            | project subscriptionId, name, displayName=properties.displayName,
                      scope=properties.scope
        code_check:
          patterns:
            - file_pattern: "**/*.tf"
              search: "azurerm_subscription_policy_assignment"
              expected: "Azure Security Benchmark initiative should be assigned"
            - file_pattern: "**/*.bicep"
              search: "Microsoft.Authorization/policyAssignments"
              expected: "Azure Security Benchmark initiative should be assigned"
        azure_policies:
          - policy_name: "Microsoft cloud security benchmark"
            policy_id: "/providers/Microsoft.Authorization/policySetDefinitions/1f3afdf9-d0c9-4c3d-847f-89da613e70a8"
            effect: "Audit"
        remediation: |
          Assign the Microsoft Cloud Security Benchmark initiative:
            az policy assignment create --name 'SecurityBenchmark' \
              --policy-set-definition '1f3afdf9-d0c9-4c3d-847f-89da613e70a8' \
              --scope '/subscriptions/<subscriptionId>'

  - resource_type: "microsoft.compute/virtualmachines"
    relevance: "medium"
    checks:
      - check_id: "F7-VM-001"
        check_name: "VMs have vulnerability assessment solution deployed"
        description: "Verify that all virtual machines have a vulnerability assessment solution (e.g., Qualys or Defender VA) deployed."
        runtime_check:
          method: "resource_graph"
          query: |
            SecurityResources
            | where type == 'microsoft.security/assessments'
            | where properties.displayName == 'Machines should have a vulnerability assessment solution'
            | where properties.status.code == 'Unhealthy'
            | project subscriptionId, resourceGroup,
                      resourceId=properties.resourceDetails.id,
                      status=properties.status.code
        code_check:
          patterns:
            - file_pattern: "**/*.tf"
              search: "azurerm_security_center_server_vulnerability_assessment"
              expected: "Vulnerability assessment extension should be deployed on VMs"
            - file_pattern: "**/*.bicep"
              search: "Microsoft.Compute/virtualMachines/extensions"
              expected: "Vulnerability assessment extension should be deployed on VMs"
        azure_policies:
          - policy_name: "A vulnerability assessment solution should be enabled on your virtual machines"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/501541f7-f7e7-4cd6-868c-4190fdad3ac9"
            effect: "AuditIfNotExists"
        remediation: |
          Deploy the built-in Defender for Cloud vulnerability assessment:
            1. Navigate to Defender for Cloud > Recommendations.
            2. Select "Machines should have a vulnerability assessment solution."
            3. Click "Fix" to deploy the built-in Qualys scanner.
          Or enable via policy by assigning the VA solution deployment policy.
