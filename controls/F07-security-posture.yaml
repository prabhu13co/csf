              expected: "pricingTier should be 'Standard' for Defender for SQL"
        azure_policies:
          - policy_name: "Azure Defender for Azure SQL Database servers should be enabled"
            policy_id: "/providers/Microsoft.Authorization/policyDefinitions/7fe3b40f-802b-4f65-b5cd-43624b220838"
